name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - 'feature-*'
      - 'squad/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - 'feature-*'

jobs:
  test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore BlazorStaticWebApps.sln
      - name: Build solution
        run: dotnet build BlazorStaticWebApps.sln --no-restore
      - name: Run API unit tests
        run: dotnet test Api.Tests/Api.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=api-test-results.trx"
      - name: Run Client unit tests
        run: dotnet test Client.Tests/Client.Tests.csproj --no-build --verbosity normal --logger "trx;LogFileName=client-test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  build_and_deploy_job:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.action != 'closed' &&
       !startsWith(github.head_ref, 'squad/'))
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_MEADOW_02A012403 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "Client" # App source code path
          api_location: "Api" # Api source code path - optional
          output_location: "wwwroot" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      !startsWith(github.head_ref, 'squad/')
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_MEADOW_02A012403 }}
          action: "close"
